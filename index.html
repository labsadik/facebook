<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest Feed</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --pinterest-red: #E60023;
  --pinterest-red-hover: #AD081B;
  --bg-primary: #FFFFFF;
  --bg-secondary: #EFEFEF;
  --text-primary: #111111;
  --text-secondary: #5F5F5F;
  --border-color: #CDCDCD;
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
  background-color: var(--bg-secondary);
  margin: 0;
  padding: 0;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #cdcdcd;
  border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
  background: #a0a0a0;
}

/* HEADER STYLES */
.header {
  position: sticky;
  top: 0;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  z-index: 100;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--border-color);
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 16px;
}

.pinterest-logo {
  color: var(--pinterest-red);
  font-size: 32px;
  cursor: pointer;
  transition: transform 0.2s;
}

.pinterest-logo:hover {
  transform: scale(1.05);
}

.search-container {
  flex: 1;
  max-width: 720px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 14px 48px 14px 20px;
  border-radius: 28px;
  border: none;
  background-color: var(--bg-secondary);
  font-size: 16px;
  outline: none;
  transition: all 0.3s;
}

.search-input:focus {
  background-color: white;
  box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.15);
}

.search-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  position: relative;
}

.icon-btn:hover {
  background-color: var(--bg-secondary);
}

.icon-btn i {
  font-size: 22px;
  color: var(--text-primary);
}

.notification-badge {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 9px;
  height: 9px;
  background-color: var(--pinterest-red);
  border-radius: 50%;
  border: 2px solid white;
}

.user-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 17px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}

.user-avatar:hover {
  transform: scale(1.05);
  border-color: var(--border-color);
}

/* DROPDOWN MENU */
.dropdown-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: white;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
  min-width: 220px;
  padding: 8px 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px) scale(0.95);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
}

.dropdown-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 18px;
  cursor: pointer;
  transition: background-color 0.15s;
  color: var(--text-primary);
  font-size: 15px;
  font-weight: 400;
}

.dropdown-item:hover {
  background-color: var(--bg-secondary);
}

.dropdown-item i {
  width: 20px;
  text-align: center;
  color: var(--text-secondary);
  font-size: 17px;
}

.dropdown-divider {
  height: 1px;
  background-color: var(--border-color);
  margin: 8px 0;
}

.logout-item {
  color: var(--pinterest-red);
  font-weight: 500;
}

.logout-item i {
  color: var(--pinterest-red);
}

/* MAIN FEED */
.feed-container {
  padding: 24px;
  max-width: 1800px;
  margin: 0 auto;
}

.masonry-grid {
  column-count: 7;
  column-gap: 16px;
}

@media (max-width: 1700px) {
  .masonry-grid { column-count: 6; }
}

@media (max-width: 1400px) {
  .masonry-grid { column-count: 5; }
}

@media (max-width: 1100px) {
  .masonry-grid { column-count: 4; }
}

@media (max-width: 800px) {
  .masonry-grid { column-count: 3; }
  
  .header {
    padding: 10px 16px;
    gap: 12px;
  }
  
  .search-container {
    max-width: 480px;
  }
  
  .icon-btn {
    width: 40px;
    height: 40px;
  }
  
  .user-avatar {
    width: 40px;
    height: 40px;
    font-size: 15px;
  }
}

@media (max-width: 550px) {
  .masonry-grid { column-count: 2; }
  
  .feed-container {
    padding: 12px;
  }
  
  .header {
    padding: 8px 12px;
  }
  
  .pinterest-logo {
    font-size: 26px;
  }
  
  .search-input {
    font-size: 14px;
    padding: 11px 42px 11px 16px;
  }
}

/* PIN CARD */
.pin-card {
  break-inside: avoid;
  margin-bottom: 16px;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  cursor: zoom-in;
  background: white;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.pin-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
}

.pin-image-wrapper {
  position: relative;
  overflow: hidden;
  background-color: #f0f0f0;
}

.pin-image {
  width: 100%;
  display: block;
  object-fit: cover;
  transition: transform 0.35s ease;
}

.pin-card:hover .pin-image {
  transform: scale(1.03);
}

.pin-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.4) 0%,
    transparent 25%,
    transparent 75%,
    rgba(0, 0, 0, 0.4) 100%
  );
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: flex-end;
  padding: 14px;
}

.pin-card:hover .pin-overlay {
  opacity: 1;
}

.pin-actions {
  display: flex;
  gap: 10px;
  width: 100%;
}

.save-btn {
  flex: 1;
  background-color: var(--pinterest-red);
  color: white;
  border: none;
  padding: 11px 18px;
  border-radius: 24px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}

.save-btn:hover {
  background-color: var(--pinterest-red-hover);
  transform: scale(1.02);
}

.action-icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background-color: rgba(255, 255, 255, 0.95);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-primary);
  font-size: 16px;
}

.action-icon-btn:hover {
  background-color: white;
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.pin-info {
  padding: 10px 0;
}

.pin-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.45;
  margin: 0;
  padding: 0 6px;
}

.pin-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 6px 0;
}

.user-small-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 700;
}

.username {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

/* LOADING STATES */
.spinner-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 0;
}

.spinner {
  width: 46px;
  height: 46px;
  border: 4px solid #e0e0e0;
  border-top-color: var(--pinterest-red);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.skeleton-loader {
  animation: pulse 1.6s ease-in-out infinite;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
}

@keyframes pulse {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton-card {
  break-inside: avoid;
  margin-bottom: 16px;
  border-radius: 16px;
  overflow: hidden;
}

/* UPLOAD MODAL */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(6px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.modal-backdrop.show {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: white;
  border-radius: 32px;
  padding: 36px;
  max-width: 540px;
  width: 92%;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.92) translateY(30px);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-backdrop.show .modal-content {
  transform: scale(1) translateY(0);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.modal-title {
  font-size: 30px;
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
}

.close-modal-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--bg-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  font-size: 20px;
  color: var(--text-primary);
}

.close-modal-btn:hover {
  background: #d0d0d0;
  transform: rotate(90deg) scale(1.05);
}

.form-group {
  margin-bottom: 22px;
}

.form-label {
  display: block;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
}

.form-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--border-color);
  border-radius: 14px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus {
  border-color: #0084ff;
}

.upload-area {
  border: 2.5px dashed var(--border-color);
  border-radius: 18px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: #fafafa;
}

.upload-area:hover {
  border-color: var(--pinterest-red);
  background: #fff5f5;
  transform: translateY(-2px);
}

.upload-area i {
  font-size: 52px;
  color: var(--text-secondary);
  margin-bottom: 14px;
}

.upload-area p {
  color: var(--text-secondary);
  font-size: 15px;
  margin: 0;
}

.file-input {
  display: none;
}

.modal-actions {
  display: flex;
  gap: 14px;
  margin-top: 28px;
}

.btn {
  flex: 1;
  padding: 15px 26px;
  border-radius: 26px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: #e0e0e0;
}

.btn-primary {
  background: var(--pinterest-red);
  color: white;
}

.btn-primary:hover {
  background: var(--pinterest-red-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(230, 0, 35, 0.3);
}

/* TOAST NOTIFICATION */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--text-primary);
  color: white;
  padding: 16px 28px;
  border-radius: 28px;
  font-weight: 500;
  font-size: 15px;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
  z-index: 400;
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>

<body class="bg-white min-h-screen">

<!-- HEADER ONLY -->
<header class="header">
  <!-- Logo -->
  <div class="logo-section">
    <i class="fab fa-pinterest pinterest-logo"></i>
  </div>

  <!-- Search Bar -->
  <div class="search-container">
    <input 
      type="text" 
      placeholder="Search for ideas" 
      class="search-input"
    />
    <i class="fas fa-search search-icon"></i>
  </div>

  <!-- Action Buttons -->
  <div class="header-actions">
    <button class="icon-btn" onclick="showUpload()" title="Create">
      <i class="fas fa-plus"></i>
      <span class="notification-badge"></span>
    </button>
    
    <button class="icon-btn" title="Notifications">
      <i class="far fa-bell"></i>
      <span class="notification-badge"></span>
    </button>
    
    <button class="icon-btn" title="Messages">
      <i class="fas fa-comment-dots"></i>
    </button>
    
    <!-- User Avatar with Dropdown -->
    <div style="position: relative;" onclick="toggleUserMenu(event)">
      <div class="user-avatar">A</div>
      
      <!-- Dropdown Menu with LOGOUT -->
      <div id="userMenuDropdown" class="dropdown-menu">
        <div class="dropdown-item">
          <i class="fas fa-user-circle"></i>
          <span>Your Profile</span>
        </div>
        <div class="dropdown-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </div>
        <div class="dropdown-item">
          <i class="fas fa-question-circle"></i>
          <span>Help</span>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item logout-item" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Log out</span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- FEED GRID ONLY -->
<main class="feed-container">
  <div id="grid" class="masonry-grid"></div>
  
  <!-- Loading Spinner -->
  <div id="loader" class="hidden spinner-container">
    <div class="spinner"></div>
  </div>
  
  <!-- Skeleton Loader -->
  <div id="skeletonLoader" class="masonry-grid hidden">
    <div class="skeleton-card skeleton-loader h-64"></div>
    <div class="skeleton-card skeleton-loader h-80"></div>
    <div class="skeleton-card skeleton-loader h-72"></div>
    <div class="skeleton-card skeleton-loader h-96"></div>
    <div class="skeleton-card skeleton-loader h-68"></div>
    <div class="skeleton-card skeleton-loader h-84"></div>
    <div class="skeleton-card skeleton-loader h-76"></div>
  </div>
</main>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Create Pin</h2>
      <button class="close-modal-btn" onclick="hideUpload()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    
    <form onsubmit="event.preventDefault(); upload();">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input 
          type="text" 
          id="title"
          placeholder="Add a title"
          class="form-input"
        />
      </div>
      
      <div class="form-group">
        <label class="form-label">Image or Video</label>
        <div class="upload-area" onclick="document.getElementById('file').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Click to upload or drag and drop</p>
          <p style="font-size: 13px; margin-top: 6px; color: #999;">PNG, JPG, GIF up to 20MB</p>
          <input type="file" id="file" class="file-input" accept="image/*,video/*"/>
        </div>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="hideUpload()">Cancel</button>
        <button type="submit" class="btn btn-primary">Upload</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast"></div>

<script>
const API = "https://pinterest-clone-c9rz.onrender.com/api";
let isLoading = false;

// 🔐 CHECK LOGIN
if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}

// ==================== LOGOUT FUNCTION ====================
function logout(){
  localStorage.removeItem("token");
  showToast("Logged out successfully! 👋");
  setTimeout(() => {
    window.location.href = "login.html";
  }, 900);
}

// ==================== TOGGLE USER MENU ====================
function toggleUserMenu(event){
  if(event) event.stopPropagation();
  const dropdown = document.getElementById('userMenuDropdown');
  dropdown.classList.toggle('show');
}

// CLOSE MENU WHEN CLICKING OUTSIDE
document.addEventListener('click', function(e){
  const dropdown = document.getElementById('userMenuDropdown');
  if(!e.target.closest('.user-avatar') && !e.target.closest('.dropdown-menu')){
    dropdown.classList.remove('show');
  }
});

// ==================== SHOW/HIDE UPLOAD MODAL ====================
function showUpload(){
  const modal = document.getElementById('uploadModal');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  // Close dropdown if open
  document.getElementById('userMenuDropdown').classList.remove('show');
}

function hideUpload(){
  const modal = document.getElementById('uploadModal');
  modal.classList.remove('show');
  document.body.style.overflow = '';
  
  // Reset form
  document.getElementById('title').value = '';
  document.getElementById('file').value = '';
}

function handleBackdropClick(event){
  if(event.target === event.currentTarget){
    hideUpload();
  }
}

// ==================== UPLOAD FUNCTION ====================
async function upload(){
  const titleInput = document.getElementById('title');
  const fileInput = document.getElementById('file');
  
  if(!fileInput.files[0]){
    showToast('Please select a file', 'error');
    return;
  }
  
  showLoader();
  
  const form = new FormData();
  form.append("file", fileInput.files[0]);
  form.append("title", titleInput.value);

  try {
    const response = await fetch(API + "/post/upload", {
      method: "POST",
      headers: {
        "Authorization": localStorage.getItem("token")
      },
      body: form
    });
    
    if(response.ok){
      hideUpload();
      loadPosts(true);
      showToast('Pin created successfully! 🎉');
    } else {
      throw new Error('Upload failed');
    }
  } catch (error) {
    console.error('Upload failed:', error);
    showToast('Upload failed. Please try again.', 'error');
  } finally {
    hideLoader();
  }
}

// ==================== LOADING STATES ====================
function showLoader(){
  isLoading = true;
  document.getElementById('loader').classList.remove('hidden');
}

function hideLoader(){
  isLoading = false;
  document.getElementById('loader').classList.add('hidden');
}

function showSkeleton(){
  document.getElementById('skeletonLoader').classList.remove('hidden');
}

function hideSkeleton(){
  document.getElementById('skeletonLoader').classList.add('hidden');
}

// ==================== TOAST NOTIFICATION ====================
function showToast(message, type = 'success'){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.background = type === 'error' ? '#dc2626' : '#111111';
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3200);
}

// ==================== LOAD POSTS / PINS ====================
let page = 1;

async function loadPosts(reset = false){
  if(isLoading) return;
  
  if(reset){
    grid.innerHTML = "";
    page = 1;
    showSkeleton();
  } else {
    showLoader();
  }

  try {
    const response = await fetch(API + "/post/all?page=" + page);
    const data = await response.json();
    
    hideSkeleton();
    hideLoader();

    data.forEach((pin, index) => {
      setTimeout(() => {
        const card = document.createElement('div');
        card.className = 'pin-card';
        
        // Random heights for variety (like real Pinterest)
        const heights = ['240px', '290px', '340px', '390px', '310px', '370px', '260px'];
        const randomHeight = heights[Math.floor(Math.random() * heights.length)];
        
        let mediaContent = '';
        if(pin.type === "image"){
          mediaContent = `<img src="${pin.fileUrl}" alt="${pin.title || 'Pin'}" class="pin-image" style="height: ${randomHeight};"/>`;
        } else {
          mediaContent = `
            <video src="${pin.fileUrl}" controls class="pin-image" style="height: ${randomHeight}; object-fit: cover;"></video>
          `;
        }

        // Random usernames for realistic look
        const usernames = ['Sarah M.', 'John D.', 'Emma W.', 'Mike R.', 'Lisa K.', 'Alex P.', 'Chris T.', 'Nina B.', 'David L.', 'Sophie R.'];
        const randomUsername = usernames[Math.floor(Math.random() * usernames.length)];

        card.innerHTML = `
          <div class="pin-image-wrapper">
            ${mediaContent}
            <div class="pin-overlay">
              <div class="pin-actions">
                <button class="save-btn" onclick="savePin(this)">Save</button>
                <button class="action-icon-btn" title="Share">
                  <i class="fas fa-share-alt"></i>
                </button>
                <button class="action-icon-btn" title="More">
                  <i class="fas fa-ellipsis-h"></i>
                </button>
              </div>
            </div>
          </div>
          ${pin.title ? `
            <div class="pin-info">
              <h3 class="pin-title">${pin.title}</h3>
              <div class="pin-user">
                <div class="user-small-avatar">${randomUsername.charAt(0)}</div>
                <span class="username">${randomUsername}</span>
              </div>
            </div>
          ` : ''}
        `;
        
        grid.appendChild(card);
      }, index * 45);
    });

    page++;
  } catch (error) {
    console.error('Failed to load posts:', error);
    hideSkeleton();
    hideLoader();
    showToast('Failed to load pins', 'error');
  }
}

// ==================== SAVE PIN ACTION ====================
function savePin(button){
  const originalText = button.textContent;
  button.textContent = 'Saved ✓';
  button.style.backgroundColor = '#111111';
  
  setTimeout(() => {
    button.textContent = originalText;
    button.style.backgroundColor = '';
  }, 1600);
  
  showToast('Pin saved to your board! 💾');
}

// ==================== INFINITE SCROLL ====================
let scrollTimeout;
window.addEventListener('scroll', () => {
  if(scrollTimeout) clearTimeout(scrollTimeout);
  
  scrollTimeout = setTimeout(() => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 350 && !isLoading){
      loadPosts();
    }
  }, 120);
});

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  // ESC to close modal
  if(e.key === 'Escape'){
    hideUpload();
  }
  
  // Focus search
  if((e.ctrlKey && e.key === 'k') || e.key === '/'){
    // Don't trigger if typing in input
    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA'){
      e.preventDefault();
      document.querySelector('.search-input').focus();
    }
  }
});

// ==================== INITIALIZE ====================
loadPosts();

console.log('%c📌 Pinterest Feed Loaded!', 'color: #E60023; font-size: 18px; font-weight: bold;');
</script>

</body>
</html>
