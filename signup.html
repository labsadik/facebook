<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f0f2f5]">

<div class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-6xl grid md:grid-cols-2 gap-10 items-center">

    <!-- LEFT SIDE -->
    <div class="text-center md:text-left">
      <h1 class="text-5xl md:text-6xl font-bold text-blue-600">
        facebook
      </h1>
      <p class="mt-4 text-gray-700 text-lg md:text-2xl max-w-md">
        Create an account to connect with friends and the world.
      </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex justify-center">

      <div class="w-full max-w-md bg-white p-6 md:p-8 rounded-xl shadow-lg">

        <input id="username"
          placeholder="Username"
          class="w-full mb-3 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"/>

        <input id="email"
          placeholder="Email or phone number"
          class="w-full mb-3 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"/>

        <input id="password"
          type="password"
          placeholder="Password"
          class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"/>

        <button onclick="signup()"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition">
          Sign Up
        </button>

        <hr class="my-6">

        <a href="login.html">
          <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
            Already have an account? Login
          </button>
        </a>

      </div>

    </div>

  </div>
</div>

<script>
const API = "http://localhost:5000/api";

async function signup() {
  try {
    const res = await fetch(API + "/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: username.value,
        email: email.value,
        password: password.value
      })
    });

    const data = await res.json();

    if (res.ok) {
      alert("Account created successfully!");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Signup failed");
    }

  } catch (err) {
    alert("Server error. Please try again.");
    console.error(err);
  }
}
</script>

</body>
</html>
