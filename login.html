<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f0f2f5]">

<div class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-6xl grid md:grid-cols-2 gap-10 items-center">

    <!-- LEFT SIDE -->
    <div class="text-center md:text-left">
      <h1 class="text-5xl md:text-6xl font-bold text-blue-600">facebook</h1>
      <p class="mt-4 text-gray-700 text-lg md:text-2xl max-w-md">
        Connect with friends and the world around you on Facebook.
      </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex justify-center">

      <div class="w-full max-w-md bg-white p-6 md:p-8 rounded-xl shadow-lg">

        <input id="email"
          placeholder="Email or phone number"
          class="w-full mb-3 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"/>

        <input id="password"
          type="password"
          placeholder="Password"
          class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"/>

        <button onclick="login()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
          Log In
        </button>

        <div class="text-center mt-4">
          <a href="#" class="text-blue-600 text-sm hover:underline">
            Forgotten password?
          </a>
        </div>

        <hr class="my-6">

        <a href="signup.html">
          <button class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-semibold transition">
            Create New Account
          </button>
        </a>

      </div>

    </div>

  </div>
</div>

<script>
const API = "http://localhost:5000/api";

async function login() {
  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location.href = "index.html";
  } else {
    alert("Login failed");
  }
}
</script>

</body>
</html>
